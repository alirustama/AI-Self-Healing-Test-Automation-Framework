[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    integration: Integration tests
    unit: Unit tests
    smoke: Smoke tests
    slow: Slow running tests
    requires_whatsapp: Tests requiring WhatsApp manual interaction
